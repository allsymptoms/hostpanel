name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flask
          sudo apt-get update -qq
          sudo apt-get install -y -qq shellcheck jq

      - name: Shell syntax (bash -n)
        run: |
          for f in scripts/*.sh install.sh; do
            echo "checking $f"
            bash -n "$f"
          done

      - name: ShellCheck (lint, warnings non-fatal)
        run: shellcheck -S warning scripts/*.sh install.sh || true

      - name: Python compile
        run: python -m py_compile app.py

      - name: Chat intent routing test
        run: python tests/test_routing.py
